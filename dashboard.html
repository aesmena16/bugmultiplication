<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Cute Font -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Mascot Image -->
    <img src="assets/dino2.png" id="mascot">
    <img src="assets/dino3.png" id="mascot3">

    <div class="dashboard-container">
        <h1 id="welcomeText">Welcome!</h1>
        <h2>Multiplication Drills</h2>

        <div class="levels-grid">
            <!-- Emerging (Default Unlocked) -->
            <div class="level-card unlocked">
                <div class="board-content">
                    <h3>Emerging</h3>
                    <p>Unlocked</p>
                    <button onclick="openLevel('Emerging')">Open</button>
                </div>
            </div>

            <!-- Developing -->
            <div class="level-card locked" id="Developing">
                <div class="board-content">
                    <h3>Developing</h3>
                    <p>Locked</p>
                    <button disabled>Locked</button>
                </div>
            </div>

            <!-- Connecting -->
            <div class="level-card locked" id="Connecting">
                <div class="board-content">
                    <h3>Connecting</h3>
                    <p>Locked</p>
                    <button disabled>Locked</button>
                </div>
            </div>

            <!-- Benchmarking -->
            <div class="level-card locked" id="Benchmarking">
                <div class="board-content">
                    <h3>Benchmarking</h3>
                    <p>Locked</p>
                    <button disabled>Locked</button>
                </div>
            </div>

            <!-- Advancing -->
            <div class="level-card locked" id="Advancing">
                <div class="board-content">
                    <h3>Advancing</h3>
                    <p>Locked</p>
                    <button disabled>Locked</button>
                </div>
            </div>
        </div>

        <button class="reset-btn" onclick="resetProgress()">Reset Progress</button>
    </div>

    <!-- Audio Element -->
    <audio id="bgMusic" src="assets/Dashboard.mp3" loop></audio>

    <div id="mascotDashboardOverlay" class="mascot-fullscreen-backdrop hidden-mascot-overlay">
        <div class="mascot-dialogue-container">
            
            <div class="mascot-speech-bubble">
                <p class="mascot-greeting">Welcome back, Dino Explorer!</p>
                <p id="mascotDashboardMessage" class="mascot-instructions">
                    Teach Hams here! Ready to continue your dino math adventure? Select a level banner below to begin your training!
                </p>
                
                <button class="mascot-ok-btn" onclick="hideDashboardMascot()">Let's Go!</button>
                
                <div class="speech-bubble-arrow"></div>
            </div>

            <div class="mascot-character-wrapper">
                <img src="assets/Teach Hams.png" alt="Teach Hams Mascot" class="hamster-game-mascot">
            </div>
            
        </div>
    </div>

<script>
    let musicStarted = false; 
    
    // 1. Load learner data safely
    let learner = JSON.parse(localStorage.getItem("learnerProgress"));

    // 2. Safety Check: If data missing, gracefully redirect
    if (!learner) {
        console.warn("No learner progress found! Redirecting to setup...");
        window.location.href = "index.html"; 
    } else {
        document.getElementById("welcomeText").innerHTML = "Welcome, " + (learner.name || "Learner") + "!";
        checkUnlocks();
    }

    // FIX: Attach interactive sound listeners directly onto parent DOM structures
    window.addEventListener('DOMContentLoaded', () => {
        // Find main container grids and map explicit triggers
        const triggerZones = [document.body, document.querySelector('.dashboard-container')];
        triggerZones.forEach(zone => {
            if(zone) {
                zone.addEventListener('pointerdown', startBackgroundMusic, { passive: true });
                zone.addEventListener('click', startBackgroundMusic, { passive: true });
            }
        });
    });

    // Dedicated fallback checker
    document.addEventListener('click', startBackgroundMusic, true);

    window.onload = function() {
        document.getElementById("welcomeText").innerText = "Welcome, " + learner.name + "! 👋";
        checkUnlocks();

        // 🐹 NEW: FOOLPROOF REFERRER CHECK FOR LOCAL SERVERS
        const previousPage = document.referrer.toLowerCase();
        
        // If they came from drill.html, we absolutely DO NOT show it.
        // Otherwise, if they came from the root or index page, show it!
        if (!previousPage.includes("drill.html")) {
            // This condition matches if they logged in from index.html or raw localhost root path
            if (previousPage.includes("index.html") || previousPage === "http://127.0.0.1:5500/" || previousPage === "http://localhost:5500/" || previousPage === "https://aesmena16.github.io/bugmultiplication/") {
                const overlay = document.getElementById("mascotDashboardOverlay");
                if (overlay) {
                    overlay.classList.remove("hidden-mascot-overlay");
                    
                    // Personalize the greeting text dynamically using the profile name
                    document.getElementById("mascotDashboardMessage").innerHTML = 
                        `Hey <strong>${learner.name}</strong>! Teach Hams here! Ready to continue your math adventure? Select a level banner below to begin your training!`;
                }
            }
        }
    };

    // 🚀 NEW: HANDLER TIED TO THE LET'S GO BUTTON CLICK
    function hideDashboardMascot() {
        const overlay = document.getElementById("mascotDashboardOverlay");
        if (overlay) {
            overlay.classList.add("hidden-mascot-overlay");
        }
    }

    function startBackgroundMusic() {
        if (musicStarted) return;
        
        const audio = document.getElementById("bgMusic");
        if (!audio) return;

        audio.volume = 0.15; 
        
        audio.play()
            .then(() => {
                musicStarted = true;
                console.log("Dashboard music started successfully!");
                // Cleanup clean lines
                window.removeEventListener('pointerdown', startBackgroundMusic);
                window.removeEventListener('click', startBackgroundMusic);
                document.removeEventListener('click', startBackgroundMusic, true);
            })
            .catch(error => {
                // If it fails silently, we attempt to unblock the channel stream
                console.log("Audio waiting for a deeper gesture interaction.", error);
            });
    }

    function checkUnlocks(){
        if (!learner || !learner.completedDrills) return;

        let levels = ["Emerging", "Developing", "Connecting", "Benchmarking", "Advancing"];

        for(let i = 1; i < levels.length; i++){
            let previous = levels[i - 1];
            let drills = learner.completedDrills[previous];

            if (!drills) continue;

            let completed = drills.arrays && drills.multiples && drills.groups && drills.jumps;

            if(completed){
                let currentCard = document.getElementById(levels[i]);
                if(currentCard) {
                    currentCard.classList.remove("locked");
                    currentCard.classList.add("unlocked");
                    // Added startBackgroundMusic() here so even if their first click is the button, it forces play before navigating
                    currentCard.innerHTML = `
                        <div class="board-content">
                            <h3>${levels[i]}</h3>
                            <p>Unlocked</p>
                            <button onclick="startBackgroundMusic(); openLevel('${levels[i]}')">Open</button>
                        </div>
                    `;
                }
            }
        }
    }

    function openLevel(level){
        // Give the audio engine 150ms to fire up cleanly before switching pages
        setTimeout(() => {
            window.location.href = "drill.html?level=" + level;
        }, 150);
    }

    function resetProgress(){
        let confirmReset = confirm("Reset all progress?");
        if(confirmReset){
            localStorage.clear();
            window.location.href = "index.html";
        }
    }
</script>

</body>
</html>
